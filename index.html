<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineReview</title>
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #fff; margin:0; }
    nav { background: #1f1f1f; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    .hero { height: 400px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://picsum.photos/id/1015/1920/600') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; }
    .movies { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
    .movie-card { background: #1f1f1f; border-radius: 12px; overflow: hidden; cursor: pointer; }
    .search-container { padding: 20px; text-align: center; background: #1a1a1a; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: #1f1f1f; padding: 25px; max-width: 400px; width: 90%; border-radius: 12px; }
    button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; }
    .red-btn { background: #e50914; color: white; }
  </style>
</head>
<body>
  <nav>
    <div>
      <a onclick="showSection('home')" style="margin-right:20px;cursor:pointer;color:white;">Home</a>
      <a onclick="showSection('myreviews')" style="cursor:pointer;color:white;">My Reviews</a>
    </div>
    <div id="userInfo" style="display:none;">
      <span id="welcome"></span>
      <button onclick="logout()" class="red-btn" style="margin-left:10px;">Logout</button>
    </div>
  </nav>

  <div id="homeSection">
    <div class="hero">
      <div>
        <h1>CineReview</h1>
        <p>Your go-to for honest movie reviews</p>
      </div>
    </div>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search movies..." style="padding:12px; width:300px;">
      <button onclick="searchMovies()" class="red-btn">Search</button>
      <button onclick="loadPopular()" class="red-btn" style="margin-left:10px;">Popular</button>
    </div>
    <div id="moviesContainer" class="movies"></div>
  </div>

  <div id="myReviewsSection" style="display:none; padding:20px;">
    <h2>My Reviews</h2>
    <div id="allReviewsContainer"></div>
  </div>

  <!-- Login Modal -->
  <div id="authModal" class="modal">
    <div class="modal-content">
      <h2 id="authTitle">Login</h2>
      <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin:10px 0; background:#333; border:none; color:white;">
      <input type="password" id="password" placeholder="Password" style="width:100%; padding:12px; margin:10px 0; background:#333; border:none; color:white;">
      <button onclick="handleAuth()" class="red-btn" style="width:100%;">Login / Register</button>
      <button onclick="toggleAuthMode()" id="switchBtn" style="width:100%; margin-top:10px; background:#333;">Create New Account</button>
      <div id="authMessage" style="margin-top:10px; color:#ff6b6b; text-align:center;"></div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDPHrGShGYddwMeNdlZ4lR32BNwB2ixhAI",
      authDomain: "cinereview-32a24.firebaseapp.com",
      projectId: "cinereview-32a24",
      storageBucket: "cinereview-32a24.firebasestorage.app",
      messagingSenderId: "322771944160",
      appId: "1:322771944160:web:d7e02cb05604bb3e9ac685"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    let isLoginMode = true;

    function showAuthModal() {
      document.getElementById('authModal').style.display = 'flex';
    }

    function toggleAuthMode() {
      isLoginMode = !isLoginMode;
      document.getElementById('authTitle').textContent = isLoginMode ? 'Login' : 'Create Account';
      document.getElementById('switchBtn').textContent = isLoginMode ? 'Create New Account' : 'Back to Login';
    }

    async function handleAuth() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const msg = document.getElementById('authMessage');

      try {
        if (isLoginMode) {
          await auth.signInWithEmailAndPassword(email, password);
        } else {
          await auth.createUserWithEmailAndPassword(email, password);
        }
        document.getElementById('authModal').style.display = 'none';
      } catch (error) {
        msg.textContent = error.message;
      }
    }

    function logout() {
      auth.signOut();
    }

    // TMDB and other functions (same as your current code)
    const API_KEY = '8c50a3e883206911d391e40c304deb93';
    const BASE_URL = 'https://api.themoviedb.org/3/';

    async function fetchMovies(endpoint = 'movie/popular', query = '') {
      const container = document.getElementById('moviesContainer');
      container.innerHTML = '<p>Loading...</p>';
      try {
        let url = `${BASE_URL}${endpoint}?api_key=${API_KEY}&language=en-US&page=1`;
        if (query) url += `&query=${encodeURIComponent(query)}`;
        const res = await fetch(url);
        const data = await res.json();
        displayMovies(data.results || []);
      } catch (e) {
        container.innerHTML = '<p>Error loading movies.</p>';
      }
    }

    function displayMovies(movies) {
      const container = document.getElementById('moviesContainer');
      container.innerHTML = '';
      movies.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}" style="width:100%;"><h3>${movie.title}</h3><p>⭐ ${movie.vote_average?.toFixed(1) || 'N/A'}</p>`;
        card.onclick = () => showReviewModal(movie);
        container.appendChild(card);
      });
    }

    function searchMovies() {
      const q = document.getElementById('searchInput').value.trim();
      fetchMovies(q ? 'search/movie' : 'movie/popular', q);
    }

    function loadPopular() {
      document.getElementById('searchInput').value = '';
      fetchMovies('movie/popular');
    }

    let currentMovie = null;

    function showReviewModal(movie) {
      if (!auth.currentUser) return alert("Please login first.");
      currentMovie = movie;
      // ... modal code
      document.getElementById('modalTitle').textContent = movie.title;
      document.getElementById('modalPoster').src = `https://image.tmdb.org/t/p/w500${movie.poster_path}`;
      document.getElementById('modalOverview').textContent = movie.overview || 'No overview.';
      document.getElementById('reviewModal').style.display = 'flex';
    }

    async function submitReview() { /* your existing submitReview */ }

    function closeModal() {
      document.getElementById('reviewModal').style.display = 'none';
    }

    function showSection(section) {
      if (section === 'myreviews' && !auth.currentUser) {
        showAuthModal();
        return;
      }
      document.getElementById('homeSection').style.display = section === 'home' ? 'block' : 'none';
      document.getElementById('myReviewsSection').style.display = section === 'myreviews' ? 'block' : 'none';
    }

    window.onload = () => {
      showSection('home');
      loadPopular();
      document.getElementById('searchInput').addEventListener('input', searchMovies);
      auth.onAuthStateChanged(() => {});
    };
  </script>
</body>
</html>
