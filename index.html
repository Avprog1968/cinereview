<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineReview</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #121212; color: #fff; }
        header { background: #1f1f1f; padding: 20px; text-align: center; }
        nav { background: #333; padding: 10px; text-align: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; }
        .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://picsum.photos/1920/600') center/cover; height: 400px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .search { padding: 20px; text-align: center; }
        input { padding: 10px; width: 300px; border-radius: 4px; }
        button { padding: 10px 20px; background: #e50914; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .movies { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .movie-card { background: #1f1f1f; border-radius: 8px; overflow: hidden; cursor: pointer; }
        .movie-card img { width: 100%; height: 300px; object-fit: cover; }
        .movie-card h3 { padding: 10px; margin: 0; }
        .error { color: #ff6b6b; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>CineReview</h1>
        <p>Your go-to for honest movie reviews</p>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Movies</a>
    </nav>
    <div class="hero">
        <div>
            <h2>Discover. Rate. Review.</h2>
        </div>
    </div>
    <div class="search">
        <input type="text" id="searchInput" placeholder="Search movies...">
        <button onclick="searchMovies()">Search</button>
    </div>
    <div class="movies" id="moviesContainer"></div>

    <script>
        const API_KEY = '8c50a3e883206911d391e40c304deb93';
        const BASE_URL = 'https://api.themoviedb.org/3';

        async function fetchPopularMovies() {
            const container = document.getElementById('moviesContainer');
            container.innerHTML = '<p>Loading movies...</p>';
            try {
                const response = await fetch(`\( {BASE_URL}/movie/popular?api_key= \){API_KEY}&language=en-US`);
                if (!response.ok) throw new Error('API error');
                const data = await response.json();
                displayMovies(data.results);
            } catch (e) {
                container.innerHTML = `
                    <div class="error">
                        <p>Could not load movies right now.</p>
                        <button onclick="fetchPopularMovies()">Try Again</button>
                    </div>`;
            }
        }

        function displayMovies(movies) {
            const container = document.getElementById('moviesContainer');
            container.innerHTML = '';
            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="https://image.tmdb.org/t/p/w500\( {movie.poster_path}" alt=" \){movie.title}">
                    <h3>${movie.title}</h3>
                    <p>Rating: ${movie.vote_average}</p>
                `;
                card.onclick = () => alert(movie.overview || 'No overview available.');
                container.appendChild(card);
            });
        }

        function searchMovies() {
            alert("Search feature coming soon!");
        }

        window.onload = fetchPopularMovies;
    </script>
</body>
</html>
