<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineReview</title>
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #fff; margin:0; }
    nav { background: #1f1f1f; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    .hero { height: 400px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://picsum.photos/id/1015/1920/600') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; }
    .movies { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
    .movie-card { background: #1f1f1f; border-radius: 12px; overflow: hidden; cursor: pointer; }
    .search-container { padding: 20px; text-align: center; background: #1a1a1a; }
    button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; }
    .search-btn { background: #e50914; color: white; }
    .popular-btn { background: #e50914; color: white; margin-left: 10px; }
  </style>
</head>
<body>
  <nav>
    <div>
      <a onclick="showSection('home')" style="margin-right:20px;cursor:pointer;color:white;">Home</a>
      <a onclick="showSection('myreviews')" style="cursor:pointer;color:white;">My Reviews</a>
    </div>
    <div id="userInfo"></div>
  </nav>

  <div id="homeSection">
    <div class="hero">
      <div>
        <h1>CineReview</h1>
        <p>Your go-to for honest movie reviews</p>
      </div>
    </div>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search movies..." style="padding:12px; width:300px;">
      <button onclick="searchMovies()" class="search-btn">Search</button>
      <button onclick="loadPopular()" class="popular-btn">Popular</button>
    </div>
    <div id="moviesContainer" class="movies"></div>
  </div>

  <div id="myReviewsSection" style="display:none; padding:20px;">
    <h2>My Reviews</h2>
    <div id="allReviewsContainer">Login to see your reviews.</div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDPHrGShGYddwMeNdlZ4lR32BNwB2ixhAI",
      authDomain: "cinereview-32a24.firebaseapp.com",
      projectId: "cinereview-32a24",
      storageBucket: "cinereview-32a24.firebasestorage.app",
      messagingSenderId: "322771944160",
      appId: "1:322771944160:web:d7e02cb05604bb3e9ac685"
    };

    firebase.initializeApp(firebaseConfig);
    console.log("Firebase connected successfully!");

    const API_KEY = '8c50a3e883206911d391e40c304deb93';
    const BASE_URL = 'https://api.themoviedb.org/3/';

    async function fetchMovies(endpoint = 'movie/popular', query = '') {
      const container = document.getElementById('moviesContainer');
      container.innerHTML = '<p>Loading movies...</p>';
      try {
        let url = `${BASE_URL}${endpoint}?api_key=${API_KEY}&language=en-US&page=1`;
        if (query) url += `&query=${encodeURIComponent(query)}`;
        const res = await fetch(url);
        const data = await res.json();
        displayMovies(data.results || []);
      } catch (e) {
        container.innerHTML = '<p>Error loading movies.</p>';
      }
    }

    function displayMovies(movies) {
      const container = document.getElementById('moviesContainer');
      container.innerHTML = '';
      movies.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}" style="width:100%;"><h3>${movie.title}</h3><p>⭐ ${movie.vote_average?.toFixed(1) || 'N/A'}</p>`;
        card.onclick = () => alert(`Review for: ${movie.title}`);
        container.appendChild(card);
      });
    }

    function searchMovies() {
      const q = document.getElementById('searchInput').value.trim();
      fetchMovies(q ? 'search/movie' : 'movie/popular', q);
    }

    function loadPopular() {
      document.getElementById('searchInput').value = '';
      fetchMovies('movie/popular');
    }

    function showSection(section) {
      document.getElementById('homeSection').style.display = section === 'home' ? 'block' : 'none';
      document.getElementById('myReviewsSection').style.display = section === 'myreviews' ? 'block' : 'none';
    }

    window.onload = () => {
      showSection('home');
      loadPopular();
      document.getElementById('searchInput').addEventListener('input', searchMovies);
    };
      // Auto show login if not logged in
    if (!auth.currentUser) {
      setTimeout(() => showAuthModal(), 500);
    }</script>
    
</body>
</html>
