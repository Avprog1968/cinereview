<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineReview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; }
    nav { background: #1f1f1f; padding: 15px; display: flex; justify-content: center; gap: 30px; position: sticky; top: 0; z-index: 100; }
    nav a { color: #fff; text-decoration: none; font-weight: 500; cursor: pointer; }
    .hero { height: 500px; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://picsum.photos/id/1015/1920/1080') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; }
    .movies { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
    .movie-card { background: #1f1f1f; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
    .movie-card:hover { transform: scale(1.05); }
    .movie-card img { width: 100%; height: 270px; object-fit: cover; }
    .movie-card h3 { padding: 12px 12px 4px; font-size: 1.1em; }
    .movie-card p { padding: 0 12px 12px; color: #aaa; font-size: 0.95em; }
    .search-container { padding: 20px; text-align: center; background: #1a1a1a; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .search-container input { padding: 14px; width: 350px; max-width: 100%; border: none; border-radius: 8px; font-size: 1.1em; }
    .search-container button { padding: 14px 24px; border: none; background: #e50914; color: white; border-radius: 8px; cursor: pointer; font-size: 1.1em; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
    .modal-content { background: #1f1f1f; padding: 25px; max-width: 700px; width: 100%; border-radius: 12px; position: relative; max-height: 90vh; overflow-y: auto; }
    .close { position: absolute; top: 15px; right: 20px; font-size: 2em; cursor: pointer; color: #aaa; }
    .error { color: #ff6b6b; text-align: center; padding: 40px 20px; }
    .review-item { background: #2a2a2a; padding: 12px; margin: 8px 0; border-radius: 8px; }
  </style>
</head>
<body>
  <nav>
    <a onclick="showSection('home')">Home</a>
    <a onclick="showSection('myreviews')">My Reviews</a>
  </nav>

  <div id="homeSection">
    <div class="hero">
      <div>
        <h1 style="font-size: 3.5em;">CineReview</h1>
        <p>Your go-to for honest movie reviews</p>
        <h2>Discover. Rate. Review.</h2>
      </div>
    </div>

    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search movies...">
      <button onclick="searchMovies()">Search</button>
      <button onclick="fetchPopularMovies()" style="background:#333;">Popular</button>
    </div>

    <div id="moviesContainer" class="movies"></div>
  </div>

  <!-- My Reviews Section -->
  <div id="myReviewsSection" style="display:none; padding:20px; max-width:1200px; margin:0 auto;">
    <h1 style="text-align:center; margin-bottom:20px;">My Reviews</h1>
    <div id="allReviewsContainer"></div>
  </div>

  <!-- Review Modal -->
  <div id="reviewModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <h2 id="modalTitle"></h2>
      <img id="modalPoster" style="width:220px; float:left; margin-right:25px; border-radius:8px;" alt="">
      <p id="modalOverview" style="line-height:1.6; margin-bottom:15px;"></p>
      
      <div id="existingReviews" style="display:none; margin-bottom:15px;">
        <strong>Your Previous Reviews:</strong>
        <div id="reviewsContainer" style="max-height:200px; overflow-y:auto;"></div>
      </div>

      <h3>Write Your Review</h3>
      <textarea id="userReview" rows="5" style="width:100%; margin:10px 0; padding:12px; background:#333; border:none; border-radius:8px; color:white;" placeholder="What did you think?"></textarea>
      <input type="number" id="userRating" min="1" max="10" placeholder="Rating (1-10)" style="width:100%; padding:12px; background:#333; border:none; border-radius:8px; color:white; margin-bottom:15px;">
      <button onclick="submitReview()" style="width:100%; padding:14px; background:#e50914; color:white; border:none; border-radius:8px;">Submit Review</button>
    </div>
  </div>

  <script>
    const API_KEY = '8c50a3e883206911d391e40c304deb93';
    const BASE_URL = 'https://api.themoviedb.org/3/';
    let currentMovie = null;
    let reviews = JSON.parse(localStorage.getItem('cineReviews')) || {};

    async function fetchMovies(endpoint = 'movie/popular', query = '') {
      const container = document.getElementById('moviesContainer');
      container.innerHTML = '<div class="error"><p>Loading...</p></div>';

      try {
        let url = `${BASE_URL}${endpoint}?api_key=${API_KEY}&language=en-US&page=1`;
        if (query) url += `&query=${encodeURIComponent(query)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('Failed');
        const data = await res.json();
        displayMovies(data.results || []);
      } catch (e) {
        container.innerHTML = `<div class="error"><p>Error loading. Try again.</p></div>`;
      }
    }

    function displayMovies(movies) {
      const container = document.getElementById('moviesContainer');
      container.innerHTML = '';
      if (!movies.length) {
        container.innerHTML = '<div class="error"><p>No results found.</p></div>';
        return;
      }
      movies.forEach(m => {
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${m.poster_path}" alt="${m.title}" onerror="this.src='https://via.placeholder.com/500x750?text=No+Image'"><h3>${m.title}</h3><p>⭐ ${m.vote_average?.toFixed(1) || 'N/A'}</p>`;
        card.onclick = () => showReviewModal(m);
        container.appendChild(card);
      });
    }

    function searchMovies() {
      const q = document.getElementById('searchInput').value.trim();
      fetchMovies(q ? 'search/movie' : 'movie/popular', q);
    }

    function fetchPopularMovies() {
      document.getElementById('searchInput').value = '';
      fetchMovies('movie/popular');
    }

    function showReviewModal(movie) {
      currentMovie = movie;
      document.getElementById('modalTitle').textContent = movie.title;
      document.getElementById('modalPoster').src = `https://image.tmdb.org/t/p/w500${movie.poster_path}`;
      document.getElementById('modalOverview').textContent = movie.overview || 'No overview available.';

      const reviewsDiv = document.getElementById('reviewsContainer');
      reviewsDiv.innerHTML = '';
      const movieReviews = reviews[movie.id] || [];
      if (movieReviews.length > 0) {
        document.getElementById('existingReviews').style.display = 'block';
        movieReviews.forEach(r => {
          const p = document.createElement('p');
          p.className = 'review-item';
          p.innerHTML = `<strong>${r.rating}/10</strong> — ${r.text} <small>(${r.date})</small>`;
          reviewsDiv.appendChild(p);
        });
      } else {
        document.getElementById('existingReviews').style.display = 'none';
      }

      document.getElementById('reviewModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('reviewModal').style.display = 'none';
      document.getElementById('userReview').value = '';
      document.getElementById('userRating').value = '';
    }

    function submitReview() {
      const text = document.getElementById('userReview').value.trim();
      const rating = parseInt(document.getElementById('userRating').value);
      if (!text || !rating) return alert("Please add review and rating.");

      if (!reviews[currentMovie.id]) reviews[currentMovie.id] = [];
      reviews[currentMovie.id].push({ rating, text, date: new Date().toLocaleDateString() });

      localStorage.setItem('cineReviews', JSON.stringify(reviews));
      alert(`✅ Review saved for "${currentMovie.title}"!`);
      closeModal();
      showReviewModal(currentMovie);
    }

    function showSection(section) {
      document.getElementById('homeSection').style.display = section === 'home' ? 'block' : 'none';
      document.getElementById('myReviewsSection').style.display = section === 'myreviews' ? 'block' : 'none';
      
      if (section === 'myreviews') {
        renderAllReviews();
      }
    }

    function renderAllReviews() {
      const container = document.getElementById('allReviewsContainer');
      container.innerHTML = '';
      let hasReviews = false;

      Object.keys(reviews).forEach(movieId => {
        const movieReviews = reviews[movieId];
        movieReviews.forEach(r => {
          hasReviews = true;
          const div = document.createElement('div');
          div.className = 'review-item';
          div.innerHTML = `<strong>${r.rating}/10</strong> — ${r.text} <small>(${r.date})</small>`;
          container.appendChild(div);
        });
      });

      if (!hasReviews) {
        container.innerHTML = '<p style="text-align:center; color:#aaa;">You haven\'t written any reviews yet.</p>';
      }
    }

    window.onload = () => {
      showSection('home');
      fetchPopularMovies();
    };
    document.getElementById('searchInput').addEventListener('input', searchMovies);
  </script>
</body>
</html>
